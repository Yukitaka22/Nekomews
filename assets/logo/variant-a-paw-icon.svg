<?xml version="1.0" encoding="UTF-8"?>
<!-- Nekomews App Icon (Variant A) 1024x1024 用 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBF5"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="pawGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bgGradient)"/>

  <!-- Paw centered -->
  <g transform="translate(312, 260)">
    <ellipse cx="100" cy="90" rx="55" ry="70" fill="url(#pawGradient)"/>
    <ellipse cx="300" cy="90" rx="55" ry="70" fill="url(#pawGradient)"/>
    <ellipse cx="30" cy="230" rx="48" ry="60" fill="url(#pawGradient)"/>
    <ellipse cx="370" cy="230" rx="48" ry="60" fill="url(#pawGradient)"/>
    <path d="M 110 380
             Q 110 270, 200 270
             Q 290 270, 290 380
             Q 290 460, 200 460
             Q 110 460, 110 380 Z" fill="url(#pawGradient)"/>
  </g>
</svg>
